
<!DOCTYPE html>

    <script>

                    colors: { 
                        rosa: '#F8C8DC', 
                        rosaEscuro: '#E899B8',
                    },
                    fontFamily: { 
                        'dancing': ['"Dancing Script"', 'cursive'],
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }

<body class="bg-rosaClaro font-poppins">

            <img src="logo.png" alt="Logotipo" class="h-16 object-contain">
            <nav>

                    <li><a href="index.html" class="underline">Início</a></li>
