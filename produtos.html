<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Ateliê da Letícia Luna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { rosa: '#F8C8DC', rosaEscuro: '#E899B8', rosaClaro: '#FFF5F8' },
                    fontFamily: { script: ['"Dancing Script"', 'cursive'], sans: ['"Quicksand"', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-rosaClaro font-sans">

<header class="bg-gradient-to-r from-rosa to-rosaEscuro shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <img id="logoTopo" src="" alt="Logo" class="h-16 object-contain rounded-lg">
        <nav>
            <ul class="flex space-x-6 text-white font-semibold">
                <li><a href="index.html">Início</a></li>
                <li><a href="produtos.html" class="underline">Produtos</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container mx-auto py-12 px-4">
    <h1 class="text-5xl font-bold text-center mb-12 font-script text-rosaEscuro">Nossos Produtos ✨</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <a href="#bonecas" class="bg-white rounded-2xl p-8 shadow-lg border-2 border-dashed border-rosa hover:shadow-2xl transition-all text-center">
            <span class="text-6xl">🧸</span>
            <h3 class="text-2xl font-bold text-rosaEscuro mt-4">Bonecas de Pano</h3>
        </a>

        <a href="#feltro" class="bg-white rounded-2xl p-8 shadow-lg border-2 border-dashed border-rosa hover:shadow-2xl transition-all text-center">
            <span class="text-6xl">🧵</span>
            <h3 class="text-2xl font-bold text-rosaEscuro mt-4">Feltro</h3>
        </a>

        <a href="#naninhas" class="bg-white rounded-2xl p-8 shadow-lg border-2 border-dashed border-rosa hover:shadow-2xl transition-all text-center">
            <span class="text-6xl">🌙</span>
            <h3 class="text-2xl font-bold text-rosaEscuro mt-4">Naninhas</h3>
        </a>

        <a href="#kits" class="bg-white rounded-2xl p-8 shadow-lg border-2 border-dashed border-rosa hover:shadow-2xl transition-all text-center">
            <span class="text-6xl">🎁</span>
            <h3 class="text-2xl font-bold text-rosaEscuro mt-4">Kits</h3>
        </a>

        <a href="#encomendas" class="md:col-span-2 bg-gradient-to-r from-rosa to-rosaEscuro rounded-2xl p-8 shadow-lg border-2 border-white hover:shadow-2xl transition-all text-center">
            <span class="text-6xl text-white">📅</span>
            <h3 class="text-2xl font-bold text-white mt-4">Produtos sob Encomenda</h3>
            <p class="text-white opacity-90 mt-2">Cliente paga e aguarda o prazo</p>
        </a>
    </div>

    <div class="mt-16 text-center bg-yellow-50 border-2 border-yellow-200 rounded-xl p-6 max-w-2xl mx-auto">
        <p class="text-lg font-bold text-yellow-800">📦 Frete por conta do cliente</p>
        <p class="text-gray-700">Calculado após a confirmação do pedido, de acordo com a região e forma de envio.</p>
    </div>
</main>

<script>
    const logoSalva = localStorage.getItem('logoSite');
    if (logoSalva) document.getElementById('logoTopo').src = logoSalva;
</script>
</body>
</html>
